#=== HYPRLAND
[".config/hypr/contrib"]
  type = "git-repo"
  url = "https://github.com/hyprwm/contrib"
  refreshPeriod = "168h"

#=== TMUX
[".config/tmux/plugins/tpm"]
  type = "git-repo"
  url = "https://github.com/tmux-plugins/tpm"
  refreshPeriod = "168h"

#=== ZSH
[".zsh/pure"]
  type = "git-repo"
  url = "https://github.com/sindresorhus/pure"
  refreshPeriod = "168h"

[".zsh/gitstatus"]
  type = "git-repo"
  url = "https://github.com/romkatv/gitstatus"
  refreshPeriod = "168h"

[".zsh/zinit"]
  type = "git-repo"
  url = "https://github.com/zdharma-continuum/zinit"
  refreshPeriod = "168h"

#=== THEMES
["Themes/catppuccin/fuzzel"]
  type = "git-repo"
  url = "https://github.com/catppuccin/fuzzel"
  refreshPeriod = "168h"

[".config/btop/themes"]
  type = "archive"
  url = "https://github.com/catppuccin/btop/releases/download/1.0.0/themes.tar.gz"
  exact = true
  stripComponents = 1
  refreshPeriod = "168h"

[".config/delta/themes/catppuccin"]
  type = "git-repo"
  url = "https://github.com/catppuccin/delta"
  refreshPeriod = "168h"
