# Kubernetes-specific command snippets
snippets:
  kubectl-port-forward:
    id: "kubectl-port-forward"
    name: "kubectl-port-forward"
    description: "Forward local port to pod or service"
    command: "kubectl port-forward ${resource_arg} ${port_mapping_arg} ${namespace_arg}"
    variables:
      - name: "resource_type"
        required: true
        description: "Resource type: [pod, svc]"
        default: "svc"
        choices: ["pod", "svc"]
      - name: "resource_name"
        required: true
        description: "Resource name (e.g., my-pod, my-service)"
      - name: "host_port"
        description: "Host port (e.g., 8080)"
        required: true
        type: "port"
      - name: "target_port"
        description: "Target port (leave empty to use host port)"
        default: ""
        type: "port"
      - name: "namespace"
        description: "Namespace name"
        default: ""
    computed:
      resource_arg:
        value: 'resource_type + "/" + resource_name'
      port_mapping_arg:
        value: 'host_port + ":" + default(target_port, host_port)'
      namespace_arg:
        cases:
          - when: namespace == "all"
            value: "-A"
          - when: namespace != ""
            value: '${flag("-n", namespace)}'
          - default: true
    tags: ["kubernetes", "port-forward", "networking"]
    created_at: "2025-01-01T00:00:00Z"
    updated_at: "2025-01-01T00:00:00Z"

  kubectl-top-pods-with-sort:
    id: "kubectl-top-pods-with-sort"
    name: "kubectl-top-pods-with-sort"
    description: "kubectl top pods with additional sorting options"
    command: "kubectl top pods ${namespace_arg} | { read -r header; printf '%s\\n' \"$header\"; sort -k${column_id} -h -r; }"
    variables:
      - name: "namespace"
        description: "Namespace name"
        default: ""
      - name: "column_name"
        description: "Column to sort by"
        choices: ["cpu", "memory"]
        default: "cpu"
    computed:
      namespace_arg:
        cases:
          - when: namespace == "all"
            value: "-A"
          - when: namespace != ""
            value: '${flag("-n", namespace)}'
          - default: true
      column_id:
        cases:
          - when: column_name == "cpu"
            value: "3"
          - when: column_name == "memory"
            value: "4"

  kubectl-get-pods-advanced:
    id: "kubectl-get-pods-advanced"
    name: "kubectl-get-pods-advanced"
    description: "Advanced kubectl get pods with multiple options"
    command: "kubectl get pods ${namespace_arg} ${output_arg} ${selector_arg}"
    variables:
      - name: "namespace"
        description: "Namespace name"
        default: ""
      - name: "output"
        description: "Output format"
        choices: ["", "wide", "yaml", "json"]
        empty_label: "default"
      - name: "selector"
        description: "Label selector"
        default: ""
    computed:
      namespace_arg:
        cases:
          - when: namespace == "all"
            value: "-A"
          - when: namespace != ""
            value: '${flag("-n", namespace)}'
          - default: true
      output_arg:
        value: 'flag("-o", output)'
      selector_arg:
        value: 'flag("--selector", selector)'
    tags: ["kubernetes", "pods", "advanced"]
    created_at: "2025-01-01T00:00:00Z"
    updated_at: "2025-01-01T00:00:00Z"
