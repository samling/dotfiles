          - default: true
    tags: ["kubernetes", "services"]
    created_at: "2025-01-01T00:00:00Z"
    updated_at: "2025-01-01T00:00:00Z"

  kubectl-apply:
    id: "kubectl-apply"
    name: "kubectl-apply"
    description: "Apply Kubernetes manifests"
    command: "kubectl apply -f ${manifest_file_arg} ${namespace_arg}"
    variables:
      - name: "manifest_file"
        description: "Path to Kubernetes manifest file"
        required: true
      - name: "namespace_mode"
        description: "Namespace mode"
        choices: ["none", "all", "named"]
        default: "none"
      - name: "namespace"
        description: "Namespace name"
        visible_if: namespace_mode == "named"
        required_if: namespace_mode == "named"
    computed:
      manifest_file_arg:
        value: "manifest_file"
      namespace_arg:
        cases:
          - when: namespace_mode == "all"
            value: "-A"
          - when: namespace_mode == "named"
            value: '${flag("-n", namespace)}'
          - default: true
    tags: ["kubernetes", "apply", "manifest"]
    created_at: "2025-01-01T00:00:00Z"
    updated_at: "2025-01-01T00:00:00Z"

  kubectl-get-pods:
    id: "kubectl-get-pods"
    name: "kubectl-get-pods"
    description: "Get Kubernetes pods with namespace selection"
    command: "kubectl get pods ${namespace_arg}"
    variables:
      - name: "namespace_mode"
        description: "Namespace mode"
        choices: ["none", "all", "named"]
        default: "none"
      - name: "namespace"
        description: "Namespace name"
        visible_if: namespace_mode == "named"
        required_if: namespace_mode == "named"
    computed:
      namespace_arg:
        cases:
          - when: namespace_mode == "all"
            value: "-A"
          - when: namespace_mode == "named"
            value: '${flag("-n", namespace)}'
          - default: true
    tags: ["kubernetes", "pods"]
    created_at: "2025-01-01T00:00:00Z"
    updated_at: "2025-01-01T00:00:00Z"

  kubectl-get-pods-conditional-namespace:
    id: "kubectl-get-pods-conditional-namespace"
    name: "kubectl-get-pods-conditional-namespace"
    description: "Get pods with a namespace prompt that appears only when needed"
    command: "kubectl get pods ${namespace_arg}"
    variables:
      - name: "namespace_mode"
        description: "Namespace mode"
        choices: ["none", "all", "named"]
        default: "none"
      - name: "namespace"
        description: "Namespace name"
        visible_if: namespace_mode == "named"
        required_if: namespace_mode == "named"
    computed:
      namespace_arg:
        cases:
          - when: namespace_mode == "all"
            value: "-A"
          - when: namespace_mode == "named"
            value: '${flag("-n", namespace)}'
          - default: true
    tags: ["kubernetes", "pods", "example", "conditional"]
    created_at: "2025-01-01T00:00:00Z"
    updated_at: "2025-01-01T00:00:00Z"

  kubectl-logs:
    id: "kubectl-logs"
    name: "kubectl-logs"
    description: "Get logs from a pod in a namespace"
    command: "kubectl logs ${pod_name_arg} ${namespace_arg} ${follow_arg}"
    variables:
      - name: "pod_name"
        description: "Pod name"
        required: true
      - name: "namespace_mode"
        description: "Namespace mode"
        choices: ["none", "all", "named"]
        default: "none"
      - name: "namespace"
        description: "Namespace name"
        visible_if: namespace_mode == "named"
        required_if: namespace_mode == "named"
      - name: "follow"
        description: "Follow logs"
        type: "boolean"
        default: "false"
    computed:
      pod_name_arg:
        value: "pod_name"
      namespace_arg:
        cases:
          - when: namespace_mode == "all"
            value: "-A"
          - when: namespace_mode == "named"
            value: '${flag("-n", namespace)}'
          - default: true
      follow_arg:
        value: 'boolFlag("-f", follow)'
    tags: ["kubernetes", "logs"]
    created_at: "2025-01-01T00:00:00Z"
    updated_at: "2025-01-01T00:00:00Z"

  kubectl-port-forward:
    id: "kubectl-port-forward"
    name: "kubectl-port-forward"
    description: "Forward local port to pod or service"
    command: "kubectl port-forward ${resource_arg} ${port_mapping_arg} ${namespace_arg}"
    variables:
      - name: "resource_type"
        required: true
        description: "Resource type: [pod, svc]"
        default: "svc"
        choices: ["pod", "svc"]
      - name: "resource_name"
        required: true
        description: "Resource name (e.g., my-pod, my-service)"
      - name: "host_port"
        description: "Host port (e.g., 8080)"
        required: true
        type: "port"
      - name: "target_port"
        description: "Target port (leave empty to use host port)"
        default: ""
        type: "port"
      - name: "namespace_mode"
        description: "Namespace mode"
        choices: ["none", "all", "named"]
        default: "none"
      - name: "namespace"
        description: "Namespace name"
        visible_if: namespace_mode == "named"
        required_if: namespace_mode == "named"
    computed:
      resource_arg:
        value: 'resource_type + "/" + resource_name'
      port_mapping_arg:
        value: 'host_port + ":" + default(target_port, host_port)'
      namespace_arg:
        cases:
          - when: namespace_mode == "all"
            value: "-A"
          - when: namespace_mode == "named"
            value: '${flag("-n", namespace)}'
          - default: true
    tags: ["kubernetes", "port-forward", "networking"]
    created_at: "2025-01-01T00:00:00Z"
    updated_at: "2025-01-01T00:00:00Z"

  kubectl-get-pods-advanced:
    id: "kubectl-get-pods-advanced"
    name: "kubectl-get-pods-advanced"
    description: "Advanced kubectl get pods with multiple options"
    command: "kubectl get pods ${namespace_arg} ${output_arg} ${selector_arg}"
    variables:
      - name: "namespace_mode"
        description: "Namespace mode"
        choices: ["none", "all", "named"]
        default: "none"
      - name: "namespace"
        description: "Namespace name"
        visible_if: namespace_mode == "named"
        required_if: namespace_mode == "named"
      - name: "output"
        description: "Output format"
        choices: ["", "wide", "yaml", "json"]
        empty_label: "default"
      - name: "selector"
        description: "Label selector"
        default: ""
    computed:
      namespace_arg:
        cases:
          - when: namespace_mode == "all"
            value: "-A"
          - when: namespace_mode == "named"
            value: '${flag("-n", namespace)}'
          - default: true
      output_arg:
        value: 'flag("-o", output)'
      selector_arg:
        value: 'flag("--selector", selector)'
    tags: ["kubernetes", "pods", "advanced"]
    created_at: "2025-01-01T00:00:00Z"
    updated_at: "2025-01-01T00:00:00Z"
