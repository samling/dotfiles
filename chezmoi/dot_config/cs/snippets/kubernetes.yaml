# Kubernetes-specific command snippets
snippets:
  kubectl-describe-pod:
    id: "kubectl-describe-pod"
    name: "kubectl-describe-pod"
    description: "Describe a specific pod"
    command: "kubectl describe pod ${pod_name_arg} ${namespace_arg}"
    variables:
      - name: "pod_name"
        description: "Pod name to describe"
        required: true
      - name: "namespace_mode"
        description: "Namespace mode"
        choices: ["none", "all", "named"]
        default: "none"
      - name: "namespace"
        description: "Namespace name"
        visible_if: namespace_mode == "named"
        required_if: namespace_mode == "named"
    computed:
      pod_name_arg:
        value: "pod_name"
      namespace_arg:
        cases:
          - when: namespace_mode == "all"
            value: "-A"
          - when: namespace_mode == "named"
            value: '${flag("-n", namespace)}'
          - default: true
    tags: ["kubernetes", "describe", "pods"]
    created_at: "2025-01-01T00:00:00Z"
    updated_at: "2025-01-01T00:00:00Z"

  kubectl-get-services:
    id: "kubectl-get-services"
    name: "kubectl-get-services"
    description: "Get Kubernetes services"
    command: "kubectl get services ${namespace_arg}"
    variables:
      - name: "namespace_mode"
        description: "Namespace mode"
        choices: ["none", "all", "named"]
        default: "none"
      - name: "namespace"
        description: "Namespace name"
        visible_if: namespace_mode == "named"
        required_if: namespace_mode == "named"
    computed:
      namespace_arg:
        cases:
          - when: namespace_mode == "all"
            value: "-A"
          - when: namespace_mode == "named"
