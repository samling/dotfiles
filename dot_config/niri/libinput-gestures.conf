# libinput-gestures rules for niri.
# 3-finger swipes are reserved for niri's built-in column/workspace nav.
# 4-finger up is reserved for niri's overview.
# Pinches and 4-finger left/right/down are free.

gesture pinch in    ~/dotfiles/config/niri/scripts/gestures.sh pinchin
gesture pinch out   ~/dotfiles/config/niri/scripts/gestures.sh pinchout
gesture swipe left  4 ~/dotfiles/config/niri/scripts/gestures.sh left
gesture swipe right 4 ~/dotfiles/config/niri/scripts/gestures.sh right
