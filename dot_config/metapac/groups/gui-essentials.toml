# graphical bits wanted on any host with a display layer,
# including WSLg hosts that don't subscribe to the full desktop stack
arch = { packages = [
  # X11 CLI tools (work under XWayland / WSLg too)
  "xclip",
  "xdotool",
  "xsel",

  # GUI apps
  "google-chrome",
  "localsend-bin",
  "ntfysh-bin",
] }
