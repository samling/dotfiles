#################
### AUTOSTART ###
#################

### Start daemons
### Note: To pass env vars, pass them to uwsm, e.g. SHOW_DEFAULT_ICON=true uwsm app -- hyprswitch ...
###
# hyprpolkitagent is enabled as a systemd user unit via home-manager
# (see modules/desktop/hyprland-packages.nix).
#exec-once = uwsm app -s b -- hypridle
#exec-once = uwsm app -- keyd-application-mapper -d
# hyprshell is enabled as a systemd user unit via home-manager
# (see modules/desktop/hyprshell.nix).
#exec-once = uwsm app -- hyprshell run
exec-once = uwsm app -s b fumon
exec-once = uwsm app -- ie-r

### Clipboard history
###
#exec-once = uwsm app -- wl-paste -p -t text --watch wl-copy

### clipse
###
#exec-once = uwsm app -- clipse -listen

### cliphist
###
#exec-once = uwsm app -- wl-paste --type text --watch cliphist store # Stores only text data
#exec-once = uwsm app -- wl-paste --type image --watch cliphist store # Stores only image data

### copyq
###
# For SOME reason having copyq running seems to fix odd issues
# with other clipboard managers hanging when being written to.
# So let's just run it for now.
#exec-once = QT_QPA_PLATFORM=xcb uwsm app -- copyq --start-server

### Enable dark mode
###
# NOTE: Handled by nwg-look instead
#env = QT_QPA_PLATFORMTHEME,qt6ct   # for Qt apps
# Handled declaratively by home-manager (gtk module + dconf.settings)
#exec-once = gsettings set org.gnome.desktop.interface gtk-theme "catppuccin-mocha-lavender-standard"   # for GTK3 apps
#exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps
exec-once = gsettings set org.gnome.desktop.interface cursor-theme BreezeX-RosePine
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24 

exec-once = uwsm app -- $HOME/.local/lib/import_env tmux # https://github.com/hyprwm/Hyprland/issues/3134
